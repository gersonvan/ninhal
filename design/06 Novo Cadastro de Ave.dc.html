<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { margin:0; background:#F7F3EA; font-family:'Manrope',sans-serif; } input::placeholder{color:#a79e88;}</style>
</helmet>
<x-import component-from-global-scope="image-slot" from="./image-slot.js"></x-import>

<div style="max-width:560px; margin:0 auto; min-height:100vh; box-sizing:border-box;">

  <div style="display:flex; align-items:center; gap:14px; padding:18px 20px; border-bottom:1px solid #E4DCC8; background:#F7F3EA; position:sticky; top:0; z-index:2;">
    <a href="04 Lista do Plantel.dc.html" style="width:36px; height:36px; border-radius:50%; background:#fff; border:1px solid #E4DCC8; display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2B2A21" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div style="font-family:'Source Serif 4',serif; font-weight:600; font-size:20px; color:#2B2A21;">Nova ave</div>
  </div>

  <div style="padding:20px; display:flex; flex-direction:column; gap:20px;">

    <div style="display:flex; justify-content:center;">
      <image-slot id="nova-ave-foto" style="width:120px;height:120px" shape="circle" placeholder="Adicionar foto"></image-slot>
    </div>

    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-size:13px; font-weight:700; color:#4a4638;">Nome</label>
      <input placeholder="Ex: Amália" style="font-family:'Manrope',sans-serif; font-size:15px; padding:13px 16px; border-radius:10px; border:1.5px solid #DDD5C2; background:#fff; color:#2B2A21;"/>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font-size:13px; font-weight:700; color:#4a4638;">Anilha</label>
        <input placeholder="BR-2026-0000" style="font-family:'Manrope',sans-serif; font-size:15px; padding:13px 16px; border-radius:10px; border:1.5px solid #DDD5C2; background:#fff; color:#2B2A21;"/>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font-size:13px; font-weight:700; color:#4a4638;">Sexo</label>
        <div style="display:flex; background:#EDE7D6; border-radius:10px; padding:4px;">
          <button onClick="{{ setSexo_M }}" style="{{ sexoStyleM }}">Macho</button>
          <button onClick="{{ setSexo_F }}" style="{{ sexoStyleF }}">Fêmea</button>
        </div>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-size:13px; font-weight:700; color:#4a4638;">Espécie</label>
      <div style="position:relative;">
        <select onChange="{{ onEspecieChange }}" style="width:100%; box-sizing:border-box; appearance:none; font-family:'Manrope',sans-serif; font-size:15px; padding:13px 16px; border-radius:10px; border:1.5px solid #DDD5C2; background:#fff; color:#2B2A21;">
          <sc-for list="{{ especies }}" as="e" hint-placeholder-count="3"><option value="{{ e }}">{{ e }}</option></sc-for>
        </select>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b6656" stroke-width="2.2" style="position:absolute; right:14px; top:16px; pointer-events:none;"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font-size:13px; font-weight:700; color:#4a4638;">Mutação / cor</label>
        <input placeholder="Ex: Isabela" style="font-family:'Manrope',sans-serif; font-size:15px; padding:13px 16px; border-radius:10px; border:1.5px solid #DDD5C2; background:#fff; color:#2B2A21;"/>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font-size:13px; font-weight:700; color:#4a4638;">Nascimento</label>
        <input type="date" style="font-family:'Manrope',sans-serif; font-size:15px; padding:13px 16px; border-radius:10px; border:1.5px solid #DDD5C2; background:#fff; color:#2B2A21;"/>
      </div>
    </div>

    <div style="height:1px; background:#E4DCC8;"></div>

    <div>
      <div style="font-family:'Source Serif 4',serif; font-weight:600; font-size:18px; color:#2B2A21; margin-bottom:4px;">Genealogia</div>
      <div style="font-family:'Manrope',sans-serif; font-size:13px; color:#6b6656; margin-bottom:14px; line-height:1.5;">A seleção de pai e mãe é restrita a aves da mesma espécie já cadastradas no seu plantel — isso garante uma árvore genealógica confiável.</div>
      <div style="display:flex; flex-direction:column; gap:14px;">
        <div style="display:flex; flex-direction:column; gap:6px;">
          <label style="font-size:13px; font-weight:700; color:#4a4638;">Pai (machos de {{ especieAtual }} no plantel)</label>
          <div style="position:relative;">
            <select style="width:100%; box-sizing:border-box; appearance:none; font-family:'Manrope',sans-serif; font-size:15px; padding:13px 16px; border-radius:10px; border:1.5px solid #DDD5C2; background:#fff; color:#2B2A21;">
              <option>Nenhum / desconhecido</option>
              <sc-for list="{{ paisDisponiveis }}" as="p" hint-placeholder-count="2"><option>{{ p.nome }} — {{ p.anilha }}</option></sc-for>
            </select>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b6656" stroke-width="2.2" style="position:absolute; right:14px; top:16px; pointer-events:none;"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <label style="font-size:13px; font-weight:700; color:#4a4638;">Mãe (fêmeas de {{ especieAtual }} no plantel)</label>
          <div style="position:relative;">
            <select style="width:100%; box-sizing:border-box; appearance:none; font-family:'Manrope',sans-serif; font-size:15px; padding:13px 16px; border-radius:10px; border:1.5px solid #DDD5C2; background:#fff; color:#2B2A21;">
              <option>Nenhuma / desconhecida</option>
              <sc-for list="{{ maesDisponiveis }}" as="m" hint-placeholder-count="2"><option>{{ m.nome }} — {{ m.anilha }}</option></sc-for>
            </select>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b6656" stroke-width="2.2" style="position:absolute; right:14px; top:16px; pointer-events:none;"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        </div>
      </div>
      <div style="background:#DCE3EA; border:1.5px solid #7C93AD; border-radius:10px; padding:12px 14px; margin-top:12px; font-family:'Manrope',sans-serif; font-size:12.5px; color:#2F4A6B; display:flex; gap:8px;">
        <span>ⓘ</span><span>Não encontrou pai/mãe na lista? Cadastre a ave dos genitores primeiro, ou marque como "origem externa".</span>
      </div>
    </div>

    <div style="height:1px; background:#E4DCC8;"></div>

    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-size:13px; font-weight:700; color:#4a4638;">Origem</label>
      <div style="display:flex; background:#EDE7D6; border-radius:10px; padding:4px;">
        <button style="flex:1; padding:10px 0; border:none; border-radius:8px; cursor:pointer; font-family:'Manrope',sans-serif; font-weight:700; font-size:13px; background:#4B5D3A; color:#F7F3EA;">Nascida no criatório</button>
        <button style="flex:1; padding:10px 0; border:none; border-radius:8px; cursor:pointer; font-family:'Manrope',sans-serif; font-weight:700; font-size:13px; background:transparent; color:#6b6656;">Adquirida</button>
      </div>
    </div>

    <div style="display:flex; gap:12px; margin-top:8px; padding-bottom:24px;">
      <a href="04 Lista do Plantel.dc.html" style="flex:1; text-align:center; text-decoration:none; font-family:'Manrope',sans-serif; font-weight:700; font-size:15px; color:#6b6656; border:1.5px solid #E4DCC8; padding:14px; border-radius:10px;">Cancelar</a>
      <a href="04 Lista do Plantel.dc.html" style="flex:1; text-align:center; text-decoration:none; font-family:'Manrope',sans-serif; font-weight:700; font-size:15px; color:#F7F3EA; background:#4B5D3A; padding:14px; border-radius:10px;">Salvar ave</a>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const PLANTEL = [
  { nome:'Rufus', anilha:'BR-2021-0099', sexo:'M', especie:'Canário Belga' },
  { nome:'Alice', anilha:'BR-2021-0075', sexo:'F', especie:'Canário Belga' },
  { nome:'Theo', anilha:'BR-2023-0345', sexo:'M', especie:'Calopsita' },
  { nome:'Nina', anilha:'BR-2024-0512', sexo:'F', especie:'Calopsita' },
  { nome:'Bela', anilha:'BR-2022-0210', sexo:'F', especie:'Calopsita' },
];

class Component extends DCLogic {
  state = { sexo: 'F', especie: 'Canário Belga' };

  renderVals() {
    const tabStyle = (active) => ({
      flex:1, padding:'10px 0', border:'none', borderRadius:8, cursor:'pointer',
      fontFamily:'Manrope,sans-serif', fontWeight:700, fontSize:13,
      background: active ? '#4B5D3A' : 'transparent', color: active ? '#F7F3EA' : '#6b6656'
    });
    return {
      especies: ['Canário Belga', 'Calopsita', 'Periquito Australiano'],
      especieAtual: this.state.especie,
      sexoStyleM: tabStyle(this.state.sexo === 'M'),
      sexoStyleF: tabStyle(this.state.sexo === 'F'),
      setSexo_M: () => this.setState({ sexo: 'M' }),
      setSexo_F: () => this.setState({ sexo: 'F' }),
      onEspecieChange: (e) => this.setState({ especie: e.target.value }),
      paisDisponiveis: PLANTEL.filter(a => a.especie === this.state.especie && a.sexo === 'M'),
      maesDisponiveis: PLANTEL.filter(a => a.especie === this.state.especie && a.sexo === 'F'),
    };
  }
}

</script>
</body>
</html>
